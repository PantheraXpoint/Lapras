<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LAPRAS++ Smart Home — Floor Overview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #e8f0fa;
      color: #1e293b;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .logo-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: #fff; letter-spacing: -1px;
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.3px;
    }
    header p {
      margin: 0;
      font-size: 12px;
      color: #64748b;
    }

    /* ── Scene ── */
    #scene-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── HUD: legend & tip ── */
    #legend {
      position: fixed;
      bottom: 20px; left: 20px;
      display: flex; flex-wrap: wrap; gap: 8px;
      z-index: 5;
      pointer-events: none;
    }
    #legend span {
      background: rgba(255,255,255,0.92);
      color: #334155;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      border: 1px solid rgba(15,23,42,0.1);
      box-shadow: 0 2px 8px rgba(15,23,42,0.06);
    }
    #legend i {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }

    #tip {
      position: fixed;
      top: 90px; right: 20px;
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #334155;
      line-height: 1.5;
      max-width: 260px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.08);
      z-index: 5;
    }
    #tip h3 {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
    }
    #tip kbd {
      background: #f1f5f9;
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: ui-monospace, monospace;
      color: #475569;
    }

    /* ── Hover tooltip ── */
    #hover-tip {
      position: fixed;
      pointer-events: none;
      background: #0f172a;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      display: none;
      z-index: 20;
      box-shadow: 0 4px 12px rgba(15,23,42,0.3);
      transform: translate(12px, -28px);
    }
    #hover-tip::after {
      content: ' →';
      color: #7dd3fc;
      margin-left: 4px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #64748b;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(15,23,42,0.06);
      z-index: 5;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">L++</div>
  <div>
    <h1>LAPRAS++ Smart Home</h1>
    <p>3D floor overview — click a highlighted room to open its sensor visualization</p>
  </div>
</header>

<div id="scene-container"></div>

<div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#e8f0fa;color:#334155;font-size:14px;z-index:50;">
  Loading 3D scene…
</div>
<div id="error-box" style="display:none;position:fixed;top:90px;left:50%;transform:translateX(-50%);background:#fef2f2;color:#991b1b;border:1px solid #fecaca;padding:14px 18px;border-radius:10px;font-size:13px;max-width:640px;z-index:60;font-family:ui-monospace,monospace;white-space:pre-wrap;"></div>

<div id="tip">
  <h3>Navigation</h3>
  <kbd>Drag</kbd> rotate &nbsp;·&nbsp;
  <kbd>Right-drag</kbd> pan &nbsp;·&nbsp;
  <kbd>Scroll</kbd> zoom<br>
  Blue rooms are interactive.
</div>

<div id="legend">
  <span><i style="background:#0ea5e9"></i>Interactive room</span>
  <span><i style="background:#cbd5e1"></i>Standard room</span>
  <span><i style="background:#f8faff"></i>Hallway</span>
</div>

<div id="hover-tip"></div>

<footer>LAPRAS++ Smart Space System — KAIST</footer>

<script type="module">
window.addEventListener('error', ev => {
  const box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'Error: ' + (ev.message || ev); }
});
window.addEventListener('unhandledrejection', ev => {
  const box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'Module load error: ' + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason); }
});

let THREE, OrbitControls;
try {
  THREE = await import('https://esm.sh/three@0.170.0');
  const oc = await import('https://esm.sh/three@0.170.0/examples/jsm/controls/OrbitControls.js');
  OrbitControls = oc.OrbitControls;
} catch (e) {
  const box = document.getElementById('error-box');
  if (box) {
    box.style.display = 'block';
    box.textContent = 'Failed to load Three.js from CDN.\n' + (e.message || e) +
      '\n\nThis page needs internet access to load three.js from esm.sh.';
  }
  throw e;
}

// ─────────────────────────────────────────────
//  Floor layout (metres, top-down: x = right, z = forward)
//  Based on layout_index.png
// ─────────────────────────────────────────────

const HALLWAY_Z0 = 4.0, HALLWAY_Z1 = 6.0; // hallway band on z-axis

const rooms = [
  // Left wing
  { id: 'room1', name: 'Room 1',  x: 0,  z: 3,    w: 4,   d: 4,
    link: 'visualize_smart_room_aframe.html', interactive: true,
    subtitle: 'N1 Lab · A-Frame' },

  // Top row
  { id: 'room2', name: 'Room 2', x: 4,  z: 0,    w: 4,   d: 4, interactive: false },
  { id: 'room3', name: 'Room 3', x: 8,  z: 0,    w: 4,   d: 4, interactive: false },
  { id: 'room4', name: 'Room 4', x: 12, z: 0,    w: 4,   d: 4, interactive: false },

  // Bottom row
  { id: 'room5', name: 'Room 5', x: 4,  z: 6,    w: 4,   d: 4, interactive: false },
  { id: 'room6', name: 'Room 6', x: 8,  z: 6,    w: 4,   d: 4, interactive: false },
  { id: 'room7', name: 'Room 7', x: 12, z: 6,    w: 4,   d: 4,
    link: 'new_room_layout.html', interactive: true,
    subtitle: 'Living Room · Three.js' },
];

const hallway = { x: 4, z: HALLWAY_Z0, w: 12, d: HALLWAY_Z1 - HALLWAY_Z0 };

// Door gaps between each numbered room and the hallway
const doors = [
  // Top-row rooms open southward into hallway
  { x: 4 + 2 - 0.45, z: HALLWAY_Z0, w: 0.9, side: 'z' },
  { x: 8 + 2 - 0.45, z: HALLWAY_Z0, w: 0.9, side: 'z' },
  { x: 12 + 2 - 0.45, z: HALLWAY_Z0, w: 0.9, side: 'z' },
  // Bottom-row rooms open northward into hallway
  { x: 4 + 2 - 0.45, z: HALLWAY_Z1, w: 0.9, side: 'z' },
  { x: 8 + 2 - 0.45, z: HALLWAY_Z1, w: 0.9, side: 'z' },
  { x: 12 + 2 - 0.45, z: HALLWAY_Z1, w: 0.9, side: 'z' },
  // Room 1 opens east into the hallway's west end (hallway starts at x=4, z=4..6)
  { x: 4, z: HALLWAY_Z0 + 0.6, w: 0.9, side: 'x' },
];

const WALL_H = 2.6;
const WALL_T = 0.12;

// Derived floor bounds
const floorMinX = 0, floorMaxX = 16;
const floorMinZ = 0, floorMaxZ = 10;
const floorW = floorMaxX - floorMinX;
const floorD = floorMaxZ - floorMinZ;

// ─────────────────────────────────────────────
//  Three.js scene
// ─────────────────────────────────────────────

const container = document.getElementById('scene-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8f0fa);
scene.fog = new THREE.Fog(0xe8f0fa, 25, 70);

const camera = new THREE.PerspectiveCamera(
  46,
  container.clientWidth / container.clientHeight,
  0.1, 200
);
camera.position.set(floorW * 0.5, 18, floorD + 11);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(floorW * 0.5, 0, floorD * 0.5);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 55;
controls.maxPolarAngle = Math.PI * 0.48; // prevent going below the floor
controls.update();

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xe8eef5, 0.8));

const sun = new THREE.DirectionalLight(0xfff8f0, 1.5);
sun.position.set(6, 20, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -5;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25;
sun.shadow.camera.bottom = -5;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 60;
scene.add(sun);

// ── Ground plate ──
const groundMat = new THREE.MeshStandardMaterial({
  color: 0xd9e2ed, roughness: 0.9, metalness: 0
});
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(floorW + 4, floorD + 4),
  groundMat
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(floorW / 2, -0.02, floorD / 2);
ground.receiveShadow = true;
scene.add(ground);

// Subtle grid overlay
const grid = new THREE.GridHelper(Math.max(floorW, floorD) + 4, 20, 0xb8c5d6, 0xd8dfe8);
grid.position.set(floorW / 2, -0.01, floorD / 2);
grid.material.transparent = true;
grid.material.opacity = 0.6;
scene.add(grid);

// ─────────────────────────────────────────────
//  Rendering helpers
// ─────────────────────────────────────────────

const matFloorStd  = new THREE.MeshStandardMaterial({ color: 0xe4e9f0, roughness: 0.55, metalness: 0.02 });
const matFloorHall = new THREE.MeshStandardMaterial({ color: 0xf8faff, roughness: 0.6,  metalness: 0.02 });
const matWall      = new THREE.MeshStandardMaterial({ color: 0xd5dde8, roughness: 0.82, metalness: 0 });
const matWallInter = new THREE.MeshStandardMaterial({
  color: 0x0ea5e9, roughness: 0.55, metalness: 0.05,
  emissive: 0x0369a1, emissiveIntensity: 0.25,
});

function roomFloor(x, z, w, d, material, y = 0) {
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, d), material);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x + w / 2, y, z + d / 2);
  mesh.receiveShadow = true;
  return mesh;
}

function wallSegment(x0, z0, x1, z1, material = matWall, height = WALL_H) {
  // Draws a thin box along the segment.
  const dx = x1 - x0, dz = z1 - z0;
  const len = Math.hypot(dx, dz);
  if (len < 1e-4) return null;
  const geo = new THREE.BoxGeometry(len, height, WALL_T);
  const mesh = new THREE.Mesh(geo, material);
  mesh.position.set((x0 + x1) / 2, height / 2, (z0 + z1) / 2);
  mesh.rotation.y = -Math.atan2(dz, dx);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// Build a wall along an axis (x or z) from `a` to `b`, optionally skipping door gaps.
// axis='x': wall runs along x at fixed z=`fixed`. gaps are {start, end} along x.
// axis='z': wall runs along z at fixed x=`fixed`. gaps are {start, end} along z.
function axisWall(axis, fixed, a, b, gaps, material) {
  if (a > b) [a, b] = [b, a];
  const segs = [];
  let cursor = a;
  const sortedGaps = (gaps || []).slice().sort((g1, g2) => g1.start - g2.start);
  for (const g of sortedGaps) {
    const s = Math.max(g.start, a), e = Math.min(g.end, b);
    if (e <= cursor) continue;
    if (s > cursor) segs.push([cursor, s]);
    cursor = Math.max(cursor, e);
  }
  if (cursor < b) segs.push([cursor, b]);

  const built = [];
  for (const [s, e] of segs) {
    if (e - s < 0.02) continue;
    let m;
    if (axis === 'x') m = wallSegment(s, fixed, e, fixed, material);
    else              m = wallSegment(fixed, s, fixed, e, material);
    if (m) built.push(m);
  }
  return built;
}

// Text label sprite — similar technique to the reference visualizer.
function makeLabelSprite(text, subtitle = '', opts = {}) {
  const { scale = 1, bg = 'rgba(15,23,42,0.85)', fg = '#ffffff', accent = '#7dd3fc' } = opts;
  const dpr = 2;
  const pad = 14 * dpr;
  const titleSize = 30 * dpr;
  const subSize = 16 * dpr;

  // Measure
  const mctx = document.createElement('canvas').getContext('2d');
  mctx.font = `700 ${titleSize}px system-ui, -apple-system, sans-serif`;
  const tw = mctx.measureText(text).width;
  mctx.font = `600 ${subSize}px system-ui, -apple-system, sans-serif`;
  const sw = subtitle ? mctx.measureText(subtitle).width : 0;
  const w = Math.max(tw, sw) + pad * 2;
  const h = pad * 2 + titleSize + (subtitle ? subSize + 6 * dpr : 0);

  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  // Rounded background
  const r = 14 * dpr;
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Title
  ctx.fillStyle = fg;
  ctx.font = `700 ${titleSize}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(text, w / 2, pad);

  // Subtitle
  if (subtitle) {
    ctx.fillStyle = accent;
    ctx.font = `600 ${subSize}px system-ui, -apple-system, sans-serif`;
    ctx.fillText(subtitle, w / 2, pad + titleSize + 4 * dpr);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  const worldH = 0.65 * scale;
  sprite.scale.set((w / h) * worldH, worldH, 1);
  return sprite;
}

// ─────────────────────────────────────────────
//  Build floors (rooms + hallway)
// ─────────────────────────────────────────────

const interactiveMeshes = []; // for raycasting
const pulsingMaterials = [];  // animated accent highlights

rooms.forEach(r => {
  const isI = !!r.interactive;

  // Interactive rooms get a subtle blue tint on the floor to signal affordance.
  let mat;
  if (isI) {
    mat = new THREE.MeshStandardMaterial({
      color: 0xbae6fd, roughness: 0.5, metalness: 0.05,
      emissive: 0x0ea5e9, emissiveIntensity: 0.12,
    });
    pulsingMaterials.push(mat);
  } else {
    mat = matFloorStd;
  }

  const floor = roomFloor(r.x, r.z, r.w, r.d, mat, 0.002);
  floor.userData = { type: 'roomFloor', room: r };
  scene.add(floor);

  if (isI) {
    // Taller, invisible click target covering the whole room volume for easier clicking.
    const hit = new THREE.Mesh(
      new THREE.BoxGeometry(r.w - 0.1, 2.2, r.d - 0.1),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    hit.position.set(r.x + r.w / 2, 1.1, r.z + r.d / 2);
    hit.userData = { type: 'hit', room: r };
    scene.add(hit);
    interactiveMeshes.push(hit);

    // Glowing outline ring on the floor
    const ringGeo = new THREE.RingGeometry(
      Math.min(r.w, r.d) * 0.35,
      Math.min(r.w, r.d) * 0.38,
      48
    );
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x0ea5e9, transparent: true, opacity: 0.55, side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(r.x + r.w / 2, 0.015, r.z + r.d / 2);
    scene.add(ring);

    // Upward "pillar of light" for each interactive room
    const beamMat = new THREE.MeshBasicMaterial({
      color: 0x7dd3fc, transparent: true, opacity: 0.18, side: THREE.DoubleSide,
      depthWrite: false,
    });
    const beam = new THREE.Mesh(
      new THREE.CylinderGeometry(
        Math.min(r.w, r.d) * 0.28,
        Math.min(r.w, r.d) * 0.32,
        2.2, 32, 1, true
      ),
      beamMat
    );
    beam.position.set(r.x + r.w / 2, 1.1, r.z + r.d / 2);
    scene.add(beam);
  }

  // Label (above room)
  const label = makeLabelSprite(
    r.name,
    r.subtitle || '',
    { scale: isI ? 1.15 : 0.85,
      bg: isI ? 'rgba(14,165,233,0.92)' : 'rgba(15,23,42,0.82)' }
  );
  label.position.set(r.x + r.w / 2, isI ? 2.9 : 2.55, r.z + r.d / 2);
  scene.add(label);
});

// Hallway floor
const hallFloor = roomFloor(hallway.x, hallway.z, hallway.w, hallway.d, matFloorHall, 0.003);
scene.add(hallFloor);

// Hallway label
const hallLabel = makeLabelSprite('Hallway', '', {
  scale: 0.75, bg: 'rgba(100,116,139,0.85)'
});
hallLabel.position.set(hallway.x + hallway.w / 2, 0.9, hallway.z + hallway.d / 2);
scene.add(hallLabel);

// ─────────────────────────────────────────────
//  Walls — build each room's perimeter with door gaps where applicable
// ─────────────────────────────────────────────

function wallsForRect(rect, gapsByEdge, material) {
  // edges: N (z=rect.z), S (z=rect.z+rect.d), W (x=rect.x), E (x=rect.x+rect.w)
  const { x, z, w, d } = rect;
  const x0 = x, x1 = x + w, z0 = z, z1 = z + d;
  const built = [];
  built.push(...axisWall('x', z0, x0, x1, gapsByEdge.N || [], material));
  built.push(...axisWall('x', z1, x0, x1, gapsByEdge.S || [], material));
  built.push(...axisWall('z', x0, z0, z1, gapsByEdge.W || [], material));
  built.push(...axisWall('z', x1, z0, z1, gapsByEdge.E || [], material));
  return built;
}

// Compute door gaps per room edge. A door is a pass-through on the wall shared
// with the hallway (or, for room1, its east wall bordering the hallway's west end).
function gapFromDoor(doorX, doorW) {
  return { start: doorX, end: doorX + doorW };
}

// Build room walls
rooms.forEach(r => {
  const mat = r.interactive ? matWallInter : matWall;
  const gaps = { N: [], S: [], W: [], E: [] };

  // Top row (rooms 2,3,4): south edge meets hallway → door there
  if (r.z + r.d === HALLWAY_Z0) {
    gaps.S.push(gapFromDoor(r.x + r.w / 2 - 0.45, 0.9));
  }
  // Bottom row (rooms 5,6,7): north edge meets hallway → door there
  if (r.z === HALLWAY_Z1) {
    gaps.N.push(gapFromDoor(r.x + r.w / 2 - 0.45, 0.9));
  }
  // Room 1: east edge meets hallway's west end (x=4, z in [4,6])
  if (r.id === 'room1') {
    // Opening is within [4,6] on z; room1 is z=[3,7], so add to east edge
    gaps.E.push({ start: HALLWAY_Z0 + 0.6, end: HALLWAY_Z0 + 0.6 + 0.9 });
  }

  const built = wallsForRect({ x: r.x, z: r.z, w: r.w, d: r.d }, gaps, mat);
  built.forEach(m => scene.add(m));

  // If interactive, give the wall material a pulsing component
  if (r.interactive) {
    // Add a ceiling-line highlight on top of walls for extra pop
    const topFrame = new THREE.Mesh(
      new THREE.BoxGeometry(r.w + 0.05, 0.04, 0.04),
      new THREE.MeshStandardMaterial({
        color: 0x7dd3fc, emissive: 0x0ea5e9, emissiveIntensity: 0.8,
      })
    );
    topFrame.position.set(r.x + r.w / 2, WALL_H + 0.02, r.z);
    scene.add(topFrame);
    const topFrame2 = topFrame.clone();
    topFrame2.position.set(r.x + r.w / 2, WALL_H + 0.02, r.z + r.d);
    scene.add(topFrame2);
    const topFrameL = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.04, r.d + 0.05),
      topFrame.material
    );
    topFrameL.position.set(r.x, WALL_H + 0.02, r.z + r.d / 2);
    scene.add(topFrameL);
    const topFrameR = topFrameL.clone();
    topFrameR.position.set(r.x + r.w, WALL_H + 0.02, r.z + r.d / 2);
    scene.add(topFrameR);
  }
});

// Hallway outer walls (north & south) — only the bits that aren't shared with rooms.
// Top row of rooms (x=4..16) forms hallway north wall → already drawn by each room's south wall.
// Bottom row of rooms forms hallway south wall → already drawn.
// Hallway west end (x=4) is shared with room1 east edge → already drawn.
// Hallway east end (x=16): cap wall, full height, no door.
scene.add(wallSegment(hallway.x + hallway.w, hallway.z,
                      hallway.x + hallway.w, hallway.z + hallway.d, matWall));

// ─────────────────────────────────────────────
//  Interaction: hover + click
// ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const hoverTip = document.getElementById('hover-tip');
let hoverRoom = null;

function setPointerFromEvent(ev) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
}

function pickRoom() {
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(interactiveMeshes, false);
  for (const h of hits) {
    if (h.object.userData && h.object.userData.room) return h.object.userData.room;
  }
  return null;
}

renderer.domElement.addEventListener('pointermove', ev => {
  setPointerFromEvent(ev);
  const r = pickRoom();
  if (r !== hoverRoom) {
    hoverRoom = r;
    if (r) {
      document.body.style.cursor = 'pointer';
      hoverTip.style.display = 'block';
      hoverTip.textContent = `Open ${r.name}`;
    } else {
      document.body.style.cursor = '';
      hoverTip.style.display = 'none';
    }
  }
  if (hoverRoom) {
    hoverTip.style.left = ev.clientX + 'px';
    hoverTip.style.top = ev.clientY + 'px';
  }
});

renderer.domElement.addEventListener('pointerleave', () => {
  hoverRoom = null;
  document.body.style.cursor = '';
  hoverTip.style.display = 'none';
});

renderer.domElement.addEventListener('click', ev => {
  setPointerFromEvent(ev);
  const r = pickRoom();
  if (r && r.link) {
    window.location.href = r.link;
  }
});

// ─────────────────────────────────────────────
//  Resize + render loop
// ─────────────────────────────────────────────

function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

const clock = new THREE.Clock();
function tick() {
  const t = clock.getElapsedTime();
  // Subtle pulse on interactive-room floors
  const pulse = 0.12 + 0.08 * (0.5 + 0.5 * Math.sin(t * 2.2));
  pulsingMaterials.forEach(m => { m.emissiveIntensity = pulse; });

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// Hide loading overlay now that first frame has rendered
const loadingEl = document.getElementById('loading');
if (loadingEl) loadingEl.style.display = 'none';
</script>
